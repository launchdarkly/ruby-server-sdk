name: Setup Ruby
description: 'Install ruby, and optionally the project dependencies'
inputs:
  version:
    description: 'The version of ruby to setup and run'
    required: true
  install-dependencies:
    description: 'Whether to install the project dependencies'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - uses: ruby/setup-ruby@6e5d382445ae5590b7449d8b3bc8cb1c2c27f617 # v1.317.0
      with:
        ruby-version: ${{ inputs.version }}
        bundler: 2

    - name: Install dependencies
      if: ${{ inputs.install-dependencies == 'true' }}
      shell: bash
      run: bundle install
