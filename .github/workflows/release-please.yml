name: Run Release Please

on:
  push:
    branches:
      - main

jobs:
  release-package:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Contents and pull-requests are for release-please to make releases.
      pull-requests: write

    outputs:
      release-created: ${{ steps.release.outputs.release_created }}

    steps:
      # Create any releases first, then create tags, and then optionally create any new PRs.
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          skip-github-pull-request: true

      # Need the repository content to be able to create and push a tag.
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created == 'true' }}

      - name: Create release tag
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/git/ref/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "Tag ${TAG_NAME} already exists, skipping creation."
          else
            echo "Creating tag ${TAG_NAME}."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "${TAG_NAME}"
            git push origin "${TAG_NAME}"
          fi

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        if: ${{ steps.release.outputs.release_created != 'true' }}
        id: release-prs
        with:
          skip-github-release: true

  build-ruby-gem:
    needs: ["release-package"]
    if: ${{ needs.release-package.outputs.release-created == 'true' }}
    uses: ./.github/workflows/build-gem.yml
    with:
      version: "3.2"

  build-jruby-gem:
    needs: ["release-package"]
    if: ${{ needs.release-package.outputs.release-created == 'true' }}
    uses: ./.github/workflows/build-gem.yml
    with:
      version: "jruby-9.4"

  publish:
    runs-on: ubuntu-latest
    needs: ["release-package", "build-ruby-gem", "build-jruby-gem"]
    if: ${{ needs.release-package.outputs.release-created == 'true' }}

    permissions:
      id-token: write # Needed if using OIDC to get release secrets.
      contents: write # Contents and pull-requests are for release-please to make releases.
      attestations: write # Needed for actions/attest.

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup
        with:
          version: "3.2"
          install-dependencies: false

      - uses: launchdarkly/gh-actions/actions/release-secrets@release-secrets-v1.2.0
        name: "Get rubygems API key"
        with:
          aws_assume_role: ${{ vars.AWS_ROLE_ARN }}
          ssm_parameter_pairs: "/production/common/releasing/rubygems/api_key = GEM_HOST_API_KEY"

      - uses: ./.github/actions/build-docs

      - uses: ./.github/actions/publish
        id: publish
        with:
          dry_run: false

      - uses: ./.github/actions/publish-docs
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: 'launchdarkly-server-sdk-*.gem'
